<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pomodoro + Habit Tracker</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 400px;
    margin: 40px auto;
    text-align: center;
    background: #f5f5f5;
  }

  h1 {
    font-size: 22px;
  }

  .box {
    background: white;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }

  #timer {
    font-size: 48px;
    margin: 10px 0;
  }

  button {
    font-size: 14px;
    padding: 8px 16px;
    margin: 4px;
    cursor: pointer;
  }

  #status {
    color: gray;
    margin-bottom: 10px;
  }

  ul {
    list-style: none;
    padding: 0;
    text-align: left;
  }

  li {
    padding: 6px 0;
    border-bottom: 1px solid #ddd;
  }

  li.done {
    text-decoration: line-through;
    color: gray;
  }

  input {
    width: 70%;
    padding: 6px;
  }
</style>
</head>
<body>

<h1>Pomodoro + Habit Tracker</h1>

<!-- Timer -->
<div class="box">
  <div id="status">Work time</div>
  <div id="timer">25:00</div>
  <button onclick="startTimer()">Start</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="resetTimer()">Reset</button>
  <br><br>
  <button onclick="setMode('work')">Work (25m)</button>
  <button onclick="setMode('break')">Break (5m)</button>
  <p>Sessions completed: <span id="sessionCount">0</span></p>
</div>

<!-- Habit Checklist -->
<div class="box">
  <h3>Daily Habits</h3>
  <ul id="habitList"></ul>
  <input id="habitInput" placeholder="New habit...">
  <button onclick="addHabit()">Add</button>
</div>

<script>
  // ---- Timer ----
  let workTime = 25 * 60;
  let breakTime = 5 * 60;
  let timeLeft = workTime;
  let mode = "work";
  let timerInterval = null;
  let sessions = 0;

  function updateDisplay() {
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;
    document.getElementById("timer").textContent =
      (minutes < 10 ? "0" : "") + minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
  }

  function startTimer() {
    if (timerInterval) return; // already running
    timerInterval = setInterval(function () {
      timeLeft--;
      updateDisplay();
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
        if (mode === "work") {
          sessions++;
          document.getElementById("sessionCount").textContent = sessions;
          setMode("break");
        } else {
          setMode("work");
        }
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  function resetTimer() {
    pauseTimer();
    timeLeft = mode === "work" ? workTime : breakTime;
    updateDisplay();
  }

  function setMode(newMode) {
    pauseTimer();
    mode = newMode;
    timeLeft = mode === "work" ? workTime : breakTime;
    document.getElementById("status").textContent = mode === "work" ? "Work time" : "Break time";
    updateDisplay();
  }

  updateDisplay();

  // ---- Habit Checklist ----
  let habits = ["Drink water", "Read 10 pages", "Stretch"];

  function renderHabits() {
    let list = document.getElementById("habitList");
    list.innerHTML = "";
    habits.forEach(function (habit, index) {
      let li = document.createElement("li");
      li.textContent = habit;
      li.onclick = function () {
        li.classList.toggle("done");
      };
      list.appendChild(li);
    });
  }

  function addHabit() {
    let input = document.getElementById("habitInput");
    let value = input.value.trim();
    if (value !== "") {
      habits.push(value);
      input.value = "";
      renderHabits();
    }
  }

  renderHabits();
</script>

</body>
</html>
