<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pomodoro + Habit Tracker</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    max-width: 420px;
    margin: 40px auto;
    text-align: center;
    background: linear-gradient(160deg, #fdf2e9, #eef3fb);
    color: #2d2d2d;
    padding: 0 16px;
  }

  h1 {
    font-size: 24px;
    color: #333;
    margin-bottom: 24px;
  }

  .box {
    background: white;
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  }

  #timer {
    font-size: 56px;
    font-weight: bold;
    margin: 12px 0;
    color: #e8823c;
    letter-spacing: 2px;
  }

  button {
    font-size: 14px;
    font-weight: 600;
    padding: 9px 18px;
    margin: 4px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #eef1f6;
    color: #333;
    transition: transform 0.1s, background 0.2s;
  }

  button:hover {
    background: #e2e7f0;
  }

  button:active {
    transform: scale(0.96);
  }

  .box button:nth-of-type(1),
  .box button:nth-of-type(2),
  .box button:nth-of-type(3) {
    background: #e8823c;
    color: white;
  }

  .box button:nth-of-type(1):hover,
  .box button:nth-of-type(2):hover,
  .box button:nth-of-type(3):hover {
    background: #d9752f;
  }

  .box button:nth-of-type(4),
  .box button:nth-of-type(5) {
    background: #7fa88f;
    color: white;
  }

  .box button:nth-of-type(4):hover,
  .box button:nth-of-type(5):hover {
    background: #6c9480;
  }

  #status {
    color: #888;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  #sessionCount {
    font-weight: bold;
    color: #e8823c;
  }

  ul {
    list-style: none;
    padding: 0;
    text-align: left;
  }

  li {
    padding: 10px 8px;
    border-bottom: 1px solid #eee;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }

  li:hover {
    background: #f7f7f7;
  }

  li.done {
    text-decoration: line-through;
    color: #aaa;
  }

  input {
    width: 65%;
    padding: 9px 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    margin-top: 10px;
  }

  input:focus {
    outline: none;
    border-color: #e8823c;
  }
</style>
</head>
<body>

<h1>Pomodoro + Habit Tracker</h1>

<!-- Timer -->
<div class="box">
  <div id="status">Work time</div>
  <div id="timer">25:00</div>
  <button onclick="startTimer()">Start</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="resetTimer()">Reset</button>
  <br><br>
  <button onclick="setMode('work')">Work (25m)</button>
  <button onclick="setMode('break')">Break (5m)</button>
  <p>Sessions completed: <span id="sessionCount">0</span></p>
</div>

<!-- Habit Checklist -->
<div class="box">
  <h3>Daily Habits</h3>
  <ul id="habitList"></ul>
  <input id="habitInput" placeholder="New habit...">
  <button onclick="addHabit()">Add</button>
</div>

<script>
  // ---- Timer ----
  let workTime = 25 * 60;
  let breakTime = 5 * 60;
  let timeLeft = workTime;
  let mode = "work";
  let timerInterval = null;
  let sessions = 0;

  function updateDisplay() {
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;
    document.getElementById("timer").textContent =
      (minutes < 10 ? "0" : "") + minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
  }

  function startTimer() {
    if (timerInterval) return; // already running
    timerInterval = setInterval(function () {
      timeLeft--;
      updateDisplay();
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
        if (mode === "work") {
          sessions++;
          document.getElementById("sessionCount").textContent = sessions;
          setMode("break");
        } else {
          setMode("work");
        }
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  function resetTimer() {
    pauseTimer();
    timeLeft = mode === "work" ? workTime : breakTime;
    updateDisplay();
  }

  function setMode(newMode) {
    pauseTimer();
    mode = newMode;
    timeLeft = mode === "work" ? workTime : breakTime;
    document.getElementById("status").textContent = mode === "work" ? "Work time" : "Break time";
    updateDisplay();
  }

  updateDisplay();

  // ---- Habit Checklist ----
  let habits = ["Drink water", "Read 10 pages", "Stretch"];

  function renderHabits() {
    let list = document.getElementById("habitList");
    list.innerHTML = "";
    habits.forEach(function (habit, index) {
      let li = document.createElement("li");
      li.textContent = habit;
      li.onclick = function () {
        li.classList.toggle("done");
      };
      list.appendChild(li);
    });
  }

  function addHabit() {
    let input = document.getElementById("habitInput");
    let value = input.value.trim();
    if (value !== "") {
      habits.push(value);
      input.value = "";
      renderHabits();
    }
  }

  renderHabits();
</script>

</body>
</html>
